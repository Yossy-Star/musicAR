<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Password Sender</title>

  <style>
    body{
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#111;
      color:white;
      margin:0;
      gap:16px;
    }

    input,
    select{
      padding:12px;
      width:260px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    button{
      padding:12px 24px;
      border:none;
      border-radius:8px;
      font-size:16px;
      background:#00c853;
      color:white;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    #status{
      font-size:14px;
      color:#aaa;
    }
  </style>
</head>
<body>

  <input
    type="password"
    id="passwordInput"
    placeholder="パスワードを入力"
  >

  <select id="commandSelect">
    <option value="music1">音楽1</option>
    <option value="music2">音楽2</option>
    <option value="music3">音楽3</option>
  </select>

  <button id="sendBtn">送信</button>

  <div id="status">待機中...</div>

  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import {
      getAuth,
      signInAnonymously
    }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import {
      getDatabase,
      ref,
      set
    }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCXS7VkDZywh84EtS3AtTUfdvOmdKEyaM",
      authDomain: "musicar-c18e9.firebaseapp.com",
      databaseURL: "https://musicar-c18e9-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "musicar-c18e9",
      storageBucket: "musicar-c18e9.firebasestorage.app",
      messagingSenderId: "546300872409",
      appId: "1:546300872409:web:53b357be74d3e5a136e0c8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const statusEl = document.getElementById('status');

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    window.addEventListener('DOMContentLoaded', () => {

      const sendBtn = document.getElementById('sendBtn');
      const passwordInput = document.getElementById('passwordInput');
      const commandSelect = document.getElementById('commandSelect');

      sendBtn.addEventListener('click', async () => {

        const password = passwordInput.value;
        const command = commandSelect.value;

        if (!password) {
          alert('パスワードを入力してください');
          return;
        }

        try {

          statusEl.textContent = '匿名ログイン中...';
          await signInAnonymously(auth);

          statusEl.textContent = 'ハッシュ化中...';
          const passwordHash = await sha256(password);

          statusEl.textContent = 'Firebase送信中...';

          // UID階層なし・authRequest直下に送信
          await set(
            ref(db, 'authRequest'),
            {
              passwordHash: passwordHash,
              command:       command,
              timestamp:     Date.now()
            }
          );

          statusEl.textContent = '送信成功';
          alert('送信しました');

        } catch (error) {
          console.error('エラー:', error);
          statusEl.textContent = '送信失敗';
          alert('送信失敗:\n' + error.message);
        }

      });

    });

  </script>

</body>
</html>
