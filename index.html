<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>MindAR Debug</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1;
}

a-scene canvas {
  background: transparent !important;
}

/* ログ表示 */
#log {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 35vh;
  overflow-y: auto;
  background: rgba(0,0,0,0.7);
  color: #00ff88;
  font-family: monospace;
  font-size: 12px;
  padding: 8px 10px;
  z-index: 9999;
  pointer-events: none;
}

/* clear button */
#log-clear {
  position: fixed;
  right: 10px;
  bottom: 10px;
  z-index: 10000;
  background: rgba(0,0,0,0.6);
  color: #cccccc;
  border: 1px solid #666;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  cursor: pointer;
}

/* ==============================
   ボタン共通
============================== */
.ctrl-btn {
  position: fixed;
  z-index: 10000;

  background: rgba(0, 0, 0, 0.65);
  color: #fff;

  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 8px;

  width: 48px;
  height: 48px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 22px;
  font-family: monospace;

  cursor: pointer;
  user-select: none;

  transition: background 0.15s;
}

.ctrl-btn:active {
  background: rgba(255,255,255,0.15);
}

.ctrl-btn:disabled {
  opacity: 0.5;
  cursor: default;
}

/* ==============================
   ボタン配置
============================== */

/* 📷 */
#ss-btn {
  left: 10px;
  bottom: 10px;
}

/* 🎥 */
#rec-btn {
  left: 70px;
  bottom: 10px;
  gap: 2px;
}

/* ⛶ */
#full-btn {
  right: 10px;
  top: 10px;
}

/* clear */
#log-clear {
  right: 10px;
  top: 70px;

  width: auto;
  height: auto;

  padding: 6px 10px;

  font-size: 12px;
}

/* ==============================
   録画中
============================== */
#rec-btn.recording {
  background: rgba(180, 0, 0, 0.75);
  border-color: #ff4444;

  animation: rec-pulse 1.2s ease-in-out infinite;
}

@keyframes rec-pulse {
  0%, 100% {
    opacity: 1;
  }

  50% {
    opacity: 0.7;
  }
}

/* ==============================
   マイク状態
============================== */
#mic-badge {
  display: inline-flex;

  align-items: center;
  justify-content: center;

  width: 16px;
  height: 16px;

  font-size: 10px;

  border-radius: 50%;
}

#mic-badge.on {
  background: rgba(0,200,100,0.35);
  color: #afffcc;
}

#mic-badge.off {
  background: rgba(255,80,80,0.3);
  color: #ffaaaa;
}

/* ==============================
   カウントダウンオーバーレイ（共通）
============================== */
#countdown-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 20000;
  align-items: center;
  justify-content: center;
  background: transparent;
  pointer-events: none;
}
#countdown-overlay.active {
  display: flex;
}
#countdown-num {
  font-size: clamp(80px, 25vw, 160px);
  font-family: monospace;
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 0 20px rgba(0,0,0,0.8),
    0 2px 6px rgba(0,0,0,0.9);
  line-height: 1;
  animation: pop 0.4s ease-out;
}
@keyframes pop {
  0%   { transform: scale(1.6); opacity: 0; }
  60%  { transform: scale(0.95); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ==============================
   フラッシュエフェクト（SS用）
============================== */
#ss-flash {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 30000;
  background: #fff;
  pointer-events: none;
}
#ss-flash.active {
  display: block;
  animation: flash-anim 0.35s ease-out forwards;
}
@keyframes flash-anim {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

/* ==============================
   録画停止ヒント（録画中のみ表示）
============================== */
#rec-hint {
  display: none;
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  background: rgba(180, 0, 0, 0.72);
  color: #fff;
  font-family: monospace;
  font-size: 14px;
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,100,100,0.5);
  pointer-events: none;
  white-space: nowrap;
}
#rec-hint.active {
  display: block;
}
</style>
</head>

<body>

<!-- log -->
<div id="log"></div>

<!-- ボタン群 -->

<button
  id="log-clear"
  class="ctrl-btn"
  style="left:auto;right:10px;">
  clear
</button>

<!-- 全画面 -->
<button id="full-btn" class="ctrl-btn">⛶</button>

<!-- スクリーンショット -->
<button id="ss-btn" class="ctrl-btn">📷</button>

<!-- 録画 -->
<button id="rec-btn" class="ctrl-btn">
  🎥
  <span id="mic-badge" class="off">🎙</span>
</button>

<!-- カウントダウン -->
<div id="countdown-overlay">
  <div id="countdown-num">3</div>
</div>

<!-- フラッシュ（SS用） -->
<div id="ss-flash"></div>

<!-- 録画停止ヒント -->
<div id="rec-hint">⏹ 画面をタップして録画停止</div>


<a-scene

  color-space="sRGB"

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  renderer="
    logarithmicDepthBuffer: true;
    antialias: true;
    alpha: true;
    preserveDrawingBuffer: true;
  "

  mindar-image="
    imageTargetSrc: ./targets.mind;
    autoStart: true;
    uiLoading: true;
    uiScanning: true;
    uiError: true;
    filterMinCF: 0.1;
    filterBeta: 10;
    missTolerance: 5;
    warmupTolerance: 3;
    maxTrack: 1;
  "

  embedded
>

  <a-assets>
    <img
      id="myImage"
      src="./image1.png"
      crossorigin="anonymous">
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false">
  </a-camera>

  <a-entity
    id="target"
    mindar-image-target="targetIndex: 0"
    smooth-transform="alpha: 0.4">

<a-plane
  id="ar-image"
  visible="false"
      src="#myImage"
      width="0.7"
      height="0.7"
      position="0 0 0.02"
      side="double"
      material="
        shader: flat;
        transparent: true;
        alphaTest: 0.5;
      ">
    </a-plane>

  </a-entity>

</a-scene>

<script>

/* =========================
   smooth-transform コンポーネント
========================= */
AFRAME.registerComponent("smooth-transform", {
  schema: {
    alpha: { type: "number", default: 0.4 }
  },
  init: function () {
    this.smoothPos   = new THREE.Vector3();
    this.smoothQuat  = new THREE.Quaternion();
    this.smoothScale = new THREE.Vector3(1, 1, 1);
    this.targetPos   = new THREE.Vector3();
    this.targetQuat  = new THREE.Quaternion();
    this.targetScale = new THREE.Vector3(1, 1, 1);
    this.isVisible   = false;
    const el = this.el;
    el.addEventListener("targetFound", () => {
      this.isVisible  = true;
      this.firstFrame = true;
    });
    el.addEventListener("targetLost", () => {
      this.isVisible = false;
    });
  },
  tick: function () {
    if (!this.isVisible) return;
    const obj = this.el.object3D;
    this.targetPos.copy(obj.position);
    this.targetQuat.copy(obj.quaternion);
    this.targetScale.copy(obj.scale);
    if (this.firstFrame) {
      this.smoothPos.copy(this.targetPos);
      this.smoothQuat.copy(this.targetQuat);
      this.smoothScale.copy(this.targetScale);
      this.firstFrame = false;
      return;
    }
    const a = this.data.alpha;
    this.smoothPos.lerp(this.targetPos, a);
    this.smoothQuat.slerp(this.targetQuat, a);
    this.smoothScale.lerp(this.targetScale, a);
    obj.position.copy(this.smoothPos);
    obj.quaternion.copy(this.smoothQuat);
    obj.scale.copy(this.smoothScale);
  }
});

/* =========================
   renderer 背景を透明化
========================= */
function fixRendererBackground() {
  const sceneEl = document.querySelector("a-scene");
  if (!sceneEl || !sceneEl.renderer) return;
  sceneEl.renderer.setClearColor(0x000000, 0);
  sceneEl.renderer.setClearAlpha(0);
  log("renderer background cleared", "#88ffcc");
}

/* =========================
   log
========================= */
const logEl = document.getElementById("log");

function log(msg, color) {
  const time = new Date().toTimeString().slice(0, 8);
  const line = document.createElement("div");
  line.style.color = color || "#00ff88";
  line.textContent = "[" + time + "] " + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

window.onerror = function (msg, url, line) {
  log("JS ERROR: " + msg + " line:" + line, "#ff5555");
};

window.addEventListener("load", () => { log("window loaded"); });

/* =========================
   scene events
========================= */
const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", () => {
  log("scene loaded");
  fixRendererBackground();
  const canvas = scene.querySelector("canvas");
  if (canvas) {
    canvas.style.background = "transparent";
    log("canvas style set transparent");
  }
});

scene.addEventListener("arReady", () => {
  log("AR READY", "#88ffcc");
  fixRendererBackground();
});

scene.addEventListener("arError", () => {
  log("AR ERROR", "#ff5555");
});

/* =========================
   target events
========================= */
const target = document.querySelector("#target");

target.addEventListener("targetFound", () => {
  log("TARGET FOUND ✓", "#ffdd55");
});

target.addEventListener("targetLost", () => {
  log("TARGET LOST", "#aaaaaa");
});

/* =========================
   image events
========================= */
const image = document.querySelector("#myImage");

image.addEventListener("load",  () => { log("image1.png loaded"); });
image.addEventListener("error", () => { log("image1.png ERROR", "#ff5555"); });

/* =========================
   targets.mind check
========================= */
fetch("./targets.mind")
  .then(r => {
    if (r.ok) {
      log("targets.mind OK");
    } else {
      log("targets.mind ERROR " + r.status, "#ff5555");
    }
  })
  .catch(() => {
    log("targets.mind fetch failed", "#ff5555");
  });


/* ============================================================
   共通ユーティリティ
============================================================ */

const countdownOverlay = document.getElementById("countdown-overlay");
const countdownNum     = document.getElementById("countdown-num");
const ssFlash          = document.getElementById("ss-flash");
const recHint          = document.getElementById("rec-hint");

const UI_SELECTORS = ["#log", "#log-clear", "#ss-btn", "#rec-btn", "#full-btn"];

function setUIVisible(visible) {
  UI_SELECTORS.forEach(sel => {
    const el = document.querySelector(sel);
    if (el) el.style.visibility = visible ? "visible" : "hidden";
  });
}

/** カウントダウン共通（3→2→1→resolve） */
function countdown(seconds) {
  return new Promise(resolve => {
    countdownNum.textContent = seconds;
    countdownOverlay.classList.add("active");
    let remaining = seconds;
    const tick = () => {
      remaining--;
      if (remaining <= 0) {
        countdownOverlay.classList.remove("active");
        resolve();
        return;
      }
      countdownNum.textContent = remaining;
      countdownNum.style.animation = "none";
      void countdownNum.offsetWidth;
      countdownNum.style.animation = "";
      setTimeout(tick, 1000);
    };
    setTimeout(tick, 1000);
  });
}

function doFlash() {
  return new Promise(resolve => {
    ssFlash.classList.remove("active");
    void ssFlash.offsetWidth;
    ssFlash.classList.add("active");
    ssFlash.addEventListener("animationend", () => {
      ssFlash.classList.remove("active");
      resolve();
    }, { once: true });
  });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement("a");
  a.href     = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

function nowString() {
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  return now.getFullYear()
    + pad(now.getMonth() + 1)
    + pad(now.getDate())
    + "_"
    + pad(now.getHours())
    + pad(now.getMinutes())
    + pad(now.getSeconds());
}


/* ============================================================
   📷 スクリーンショット
============================================================ */

function captureOnNextRender() {
  return new Promise((resolve, reject) => {
    const sceneEl  = document.querySelector("a-scene");
    const renderer = sceneEl && sceneEl.renderer;
    if (!renderer) { reject(new Error("renderer not ready")); return; }

    const originalRender = renderer.render.bind(renderer);
    renderer.render = function(scene3, camera) {
      originalRender(scene3, camera);
      renderer.render = originalRender;
      try {
        const W = window.innerWidth;
        const H = window.innerHeight;
        const composite = document.createElement("canvas");
        composite.width  = W;
        composite.height = H;
        const ctx = composite.getContext("2d");
        const video = document.querySelector("video");
        if (video && video.readyState >= 2) {
          const vW = video.videoWidth;
          const vH = video.videoHeight;
          const scale = Math.max(W / vW, H / vH);
          const dw = vW * scale;
          const dh = vH * scale;
          ctx.drawImage(video, (W - dw) / 2, (H - dh) / 2, dw, dh);
        }
        ctx.drawImage(renderer.domElement, 0, 0, W, H);
        composite.toBlob(blob => {
          if (blob) resolve(blob);
          else      reject(new Error("toBlob returned null"));
        }, "image/png");
      } catch (err) {
        reject(err);
      }
    };
  });
}

const ssBtn = document.getElementById("ss-btn");

async function takeScreenshot() {
  ssBtn.disabled = true;
  log("SS: countdown start", "#88ccff");
  setUIVisible(false);
  await countdown(3);
  try {
    const [blob] = await Promise.all([captureOnNextRender(), doFlash()]);
    downloadBlob(blob, "screenshot_" + nowString() + ".png");
    log("SS: saved → screenshot_" + nowString() + ".png", "#ffdd55");
  } catch (err) {
    log("SS: capture failed — " + err.message, "#ff5555");
  }
  setUIVisible(true);
  ssBtn.disabled = false;
}

ssBtn.addEventListener("click", takeScreenshot);


/* ============================================================
   🎥 動画録画（マイク音声付き）
   ─ 仕組み ─
   ① getUserMedia({audio:true}) でマイクストリームを取得（失敗時は映像のみ）
   ② canvas.captureStream() で映像ストリームを取得
   ③ 両ストリームのトラックを合流させた MediaStream を MediaRecorder に渡す
   ④ rAF ループで video + WebGL canvas を compositeCanvas に毎フレーム合成
   ⑤ 画面タップで停止 → Blob保存
============================================================ */

const recBtn   = document.getElementById("rec-btn");
const micBadge = document.getElementById("mic-badge");

/* 録画状態 */
let isRecording    = false;
let mediaRecorder  = null;
let recordedChunks = [];
let compositeCanvas = null;
let compositeCtx    = null;
let rafId           = null;
let micStream       = null;   // マイク MediaStream（停止時に解放）

/** 毎フレーム: video + WebGL canvas を compositeCanvas に合成 */
function drawCompositeFrame() {
  if (!isRecording) return;
  const W = compositeCanvas.width;
  const H = compositeCanvas.height;
  const sceneEl  = document.querySelector("a-scene");
  const renderer = sceneEl && sceneEl.renderer;
  compositeCtx.clearRect(0, 0, W, H);
  const video = document.querySelector("video");
  if (video && video.readyState >= 2) {
    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const scale = Math.max(W / vW, H / vH);
    const dw = vW * scale;
    const dh = vH * scale;
    compositeCtx.drawImage(video, (W - dw) / 2, (H - dh) / 2, dw, dh);
  }
  if (renderer && renderer.domElement) {
    compositeCtx.drawImage(renderer.domElement, 0, 0, W, H);
  }
  rafId = requestAnimationFrame(drawCompositeFrame);
}

/** 録画停止 */
function stopRecording() {
  if (!isRecording) return;
  log("REC: stopping…", "#88ccff");
  isRecording = false;
  document.removeEventListener("touchstart", stopOnTap, { capture: true });
  document.removeEventListener("mousedown",  stopOnTap, { capture: true });
  if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
  /* マイクストリームを解放 */
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  recHint.classList.remove("active");
  recBtn.classList.remove("recording");
  recBtn.disabled = false;
  setUIVisible(true);
}

function stopOnTap() { stopRecording(); }

/** 録画開始メイン */
async function startRecording() {
  if (isRecording) return;
  recBtn.disabled = true;
  log("REC: countdown start", "#88ccff");
  setUIVisible(false);
  await countdown(3);

  /* ── マイク取得（失敗しても続行） ── */
  let audioTracks = [];
  try {
    micStream   = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioTracks = micStream.getAudioTracks();
    log("REC: mic OK — " + (audioTracks[0] && audioTracks[0].label || "unknown"), "#afffcc");
  } catch (err) {
    log("REC: mic unavailable — " + err.message + " (映像のみ録画)", "#ffaa44");
    micStream = null;
  }

  /* ── compositeCanvas 初期化 ── */
  const W = window.innerWidth;
  const H = window.innerHeight;
  compositeCanvas        = document.createElement("canvas");
  compositeCanvas.width  = W;
  compositeCanvas.height = H;
  compositeCtx           = compositeCanvas.getContext("2d");

  /* ── 映像ストリーム + 音声トラックを合流 ── */
  const fps         = 30;
  const videoStream = compositeCanvas.captureStream(fps);
  audioTracks.forEach(t => videoStream.addTrack(t));

  /* マイクバッジ更新（録画開始後も見えるよう一時的に表示） */
  micBadge.textContent = audioTracks.length ? "🎙 ON" : "🎙 OFF";
  micBadge.className   = audioTracks.length ? "on" : "off";

  /* ── MediaRecorder ── */
  const mimeTypes = [
    "video/webm;codecs=vp9,opus",
    "video/webm;codecs=vp8,opus",
    "video/webm;codecs=vp9",
    "video/webm;codecs=vp8",
    "video/webm",
    "video/mp4",
  ];
  let mimeType = "";
  for (const mt of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mt)) { mimeType = mt; break; }
  }

  try {
    mediaRecorder = new MediaRecorder(videoStream, mimeType ? { mimeType } : {});
  } catch (err) {
    log("REC: MediaRecorder init failed — " + err.message, "#ff5555");
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    setUIVisible(true);
    recBtn.disabled = false;
    return;
  }

  recordedChunks = [];
  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    const ext  = mimeType.includes("mp4") ? "mp4" : "webm";
    const blob = new Blob(recordedChunks, { type: mimeType || "video/webm" });
    const filename = "video_" + nowString() + "." + ext;
    downloadBlob(blob, filename);
    log("REC: saved → " + filename + " (" + (blob.size / 1024).toFixed(1) + " KB)", "#ffdd55");
    recordedChunks = [];
  };
  mediaRecorder.onerror = e => {
    log("REC: error — " + e.error, "#ff5555");
    stopRecording();
  };

  isRecording = true;
  mediaRecorder.start(200);
  drawCompositeFrame();

  recBtn.classList.add("recording");
  recBtn.disabled = false;
  recHint.classList.add("active");

  log("REC: started " + W + "×" + H + " @" + fps + "fps  codec=" + (mimeType || "default") + "  audio=" + (audioTracks.length > 0), "#ff8844");

  setTimeout(() => {
    document.addEventListener("touchstart", stopOnTap, { capture: true });
    document.addEventListener("mousedown",  stopOnTap, { capture: true });
  }, 300);
}

recBtn.addEventListener("click", () => {
  if (isRecording) stopRecording();
  else             startRecording();
});


/* ============================================================
   ⛶ 全画面表示
   requestFullscreen / exitFullscreen をトグル。
   Fullscreen API はベンダープレフィックスを含めて対応。
============================================================ */

/* ============================================================
   ⛶ 全画面表示
============================================================ */

const fullBtn = document.getElementById("full-btn");

function isFullscreen() {
  return !!(
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.mozFullScreenElement ||
    document.msFullscreenElement
  );
}

function requestFullscreen(el) {
  if (el.requestFullscreen) {
    return el.requestFullscreen();
  }
  else if (el.webkitRequestFullscreen) {
    return el.webkitRequestFullscreen();
  }
  else if (el.mozRequestFullScreen) {
    return el.mozRequestFullScreen();
  }
  else if (el.msRequestFullscreen) {
    return el.msRequestFullscreen();
  }
}

function exitFullscreen() {
  if (document.exitFullscreen) {
    return document.exitFullscreen();
  }
  else if (document.webkitExitFullscreen) {
    return document.webkitExitFullscreen();
  }
  else if (document.mozCancelFullScreen) {
    return document.mozCancelFullScreen();
  }
  else if (document.msExitFullscreen) {
    return document.msExitFullscreen();
  }
}

/* ボタン表示は常に ⛶ */
function updateFullBtn() {
  fullBtn.textContent = "⛶";
}

fullBtn.addEventListener("click", () => {

  if (isFullscreen()) {

    exitFullscreen()
      .catch(err => {
        log("FS exit failed: " + err.message, "#ff5555");
      });

  } else {

    requestFullscreen(document.documentElement)
      .catch(err => {
        log("FS enter failed: " + err.message, "#ff5555");
      });

  }

});

[
  "fullscreenchange",
  "webkitfullscreenchange",
  "mozfullscreenchange",
  "MSFullscreenChange"
].forEach(ev => {

  document.addEventListener(ev, () => {

    updateFullBtn();

    log(
      "FS: " + (isFullscreen() ? "entered" : "exited"),
      "#88ccff"
    );

  });

});

/* ============================================================
   ジェスチャー解除システム
============================================================ */

const arImage = document.querySelector("#ar-image");

let gestureUnlocked = false;
let trackingActive = false;

/* 左右振りカウント */
let shakeCount = 0;
let lastShakeDirection = 0;
let lastShakeTime = 0;

/* target見つけた */
target.addEventListener("targetFound", () => {

  if (gestureUnlocked) return;

  trackingActive = true;

  log("ジェスチャー待機開始", "#00ccff");

});

/* targetロスト */
target.addEventListener("targetLost", () => {

  trackingActive = false;

  shakeCount = 0;
  lastShakeDirection = 0;

});

/* ジャイロ取得 */
window.addEventListener("devicemotion", (event) => {

  if (!trackingActive) return;
  if (gestureUnlocked) return;

  const acc = event.accelerationIncludingGravity;

  if (!acc) return;

  const x = acc.x || 0;

  const threshold = 12;

  let direction = 0;

  if (x > threshold) {
    direction = 1;
  }
  else if (x < -threshold) {
    direction = -1;
  }

  if (direction !== 0) {

    const now = Date.now();

    /* 同じ方向連続は無視 */
    if (direction !== lastShakeDirection) {

      /* 速すぎる連続を防止 */
      if (now - lastShakeTime > 150) {

        shakeCount++;

        lastShakeDirection = direction;
        lastShakeTime = now;

        log(
          "SHAKE " + shakeCount + "/6",
          "#ffdd55"
        );

        /* 左右3往復 */
        if (shakeCount >= 6) {

          gestureUnlocked = true;

          arImage.setAttribute("visible", true);

          log(
            "ジェスチャー成功 → 表示",
            "#88ff88"
          );

        }

      }

    }

  }

});


</script>
