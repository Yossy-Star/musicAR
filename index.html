<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Password Sender</title>

  <style>
    body{
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#111;
      color:white;
      margin:0;
      gap:16px;
    }

    input{
      padding:12px;
      width:260px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

<select id="commandSelect">

  <option value="music1">
    音楽1
  </option>

  <option value="music2">
    音楽2
  </option>

  <option value="music3">
    音楽3
  </option>

</select>

    button{
      padding:12px 24px;
      border:none;
      border-radius:8px;
      font-size:16px;
      background:#00c853;
      color:white;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    #status{
      font-size:14px;
      color:#aaa;
    }
  </style>
</head>
<body>

  <input
    type="password"
    id="passwordInput"
    placeholder="パスワードを入力"
  >

  <button id="sendBtn">
    送信
  </button>

  <div id="status">
    待機中...
  </div>

  <!-- Firebase -->
  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import {
      getAuth,
      signInAnonymously
    }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import {
      getDatabase,
      ref,
      set
    }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyCCXS7VkDZywh84EtS3AtTUfdvOmdKEyaM",
      authDomain: "musicar-c18e9.firebaseapp.com",
      databaseURL: "https://musicar-c18e9-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "musicar-c18e9",
      storageBucket: "musicar-c18e9.firebasestorage.app",
      messagingSenderId: "546300872409",
      appId: "1:546300872409:web:53b357be74d3e5a136e0c8"
    };

    // Firebase初期化
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const statusEl = document.getElementById('status');

    // SHA-256
    async function sha256(message) {

      const msgBuffer =
        new TextEncoder().encode(message);

      const hashBuffer =
        await crypto.subtle.digest(
          'SHA-256',
          msgBuffer
        );

      const hashArray =
        Array.from(new Uint8Array(hashBuffer));

      return hashArray
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    // HTML生成後に実行
    window.addEventListener('DOMContentLoaded', () => {

      const sendBtn =
        document.getElementById('sendBtn');

      const passwordInput =
        document.getElementById('passwordInput');

      sendBtn.addEventListener('click', async () => {

        const password =
          passwordInput.value;

        if (!password) {
          alert('パスワードを入力してください');
          return;
        }

        try {

          statusEl.textContent =
            '匿名ログイン中...';

          // 匿名ログイン
          const userCredential =
            await signInAnonymously(auth);

          const uid =
            userCredential.user.uid;

          console.log('UID:', uid);

          statusEl.textContent =
            'ハッシュ化中...';

          // SHA-256
          const passwordHash =
            await sha256(password);

          console.log('HASH:', passwordHash);

          statusEl.textContent =
            'Firebase送信中...';

          // Firebaseへ送信
          await set(
            ref(db, `authRequest/${uid}`),
            {
              passwordHash: passwordHash,
              timestamp: Date.now()
            }
          );

          console.log('送信成功');

          statusEl.textContent =
            '送信成功';

          alert('送信しました');

        } catch (error) {

          console.error('エラー:', error);

          statusEl.textContent =
            '送信失敗';

          alert(
            '送信失敗:\n' +
            error.message
          );
        }

      });

    });

  </script>

</body>
</html>
