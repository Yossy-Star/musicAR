<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Music Player</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* ── オーバーレイUI ── */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
    }

    /* ステータスバー */
    #status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: all;
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
    }
    #status-dot.connected  { background: #4CAF50; }
    #status-dot.error      { background: #f44336; }
    #status-dot.playing    { background: #2196F3; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    #status-text {
      font-size: 13px;
      color: #ddd;
      flex: 1;
    }

    /* 再生中バナー */
    #now-playing {
      position: absolute;
      bottom: 80px; left: 16px; right: 16px;
      background: rgba(33,150,243,0.9);
      border-radius: 12px;
      padding: 12px 16px;
      display: none;
      pointer-events: all;
    }
    #now-playing.visible { display: block; }
    #now-playing-title {
      font-size: 14px;
      font-weight: bold;
    }
    #now-playing-sub {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* 停止ボタン */
    #stop-btn {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(244,67,54,0.9);
      border: none;
      border-radius: 30px;
      color: #fff;
      font-size: 15px;
      padding: 12px 32px;
      cursor: pointer;
      display: none;
      pointer-events: all;
    }
    #stop-btn.visible { display: block; }

    /* マーカー認識ヒント */
    #hint {
      position: absolute;
      bottom: 30px; left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      pointer-events: none;
    }

    /* 認証画面 */
    #auth-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #111;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
    }
    #auth-screen h1 {
      font-size: 22px;
      font-weight: bold;
    }
    #auth-screen p {
      font-size: 14px;
      color: #aaa;
      text-align: center;
    }
    #token-input {
      width: 100%;
      max-width: 340px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 16px;
    }
    #auth-btn {
      width: 100%;
      max-width: 340px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #2196F3;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    #auth-error {
      color: #f44336;
      font-size: 13px;
      display: none;
    }

    /* トースト通知 */
    #toast {
      position: fixed;
      bottom: 140px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      z-index: 99999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── 認証画面 ── -->
<div id="auth-screen">
  <h1>🎵 AR Music</h1>
  <p>サーバーのトークンを入力して<br>接続してください</p>
  <input id="token-input" type="password" placeholder="トークンを入力" autocomplete="off">
  <button id="auth-btn" onclick="doAuth()">接続する</button>
  <div id="auth-error">トークンが違います。再度お試しください。</div>
</div>

<!-- ── トースト ── -->
<div id="toast"></div>

<!-- ── ARシーン ── -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded>

  <a-assets>
    <!-- マーカー画像（透明プレーン） -->
  </a-assets>

  <!-- マーカー0: トラック1 -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane
      position="0 0 0"
      width="1" height="1"
      material="opacity: 0; transparent: true"
      class="clickable"
      data-track="0"
      onclick="handleMarkerTap(0)">
    </a-plane>
    <!-- タップヒント表示 -->
    <a-text value="▶ タップして再生" align="center" position="0 -0.6 0" scale="0.4 0.4 0.4" color="#fff"></a-text>
  </a-entity>

  <!-- マーカー1: トラック2 -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-plane
      position="0 0 0"
      width="1" height="1"
      material="opacity: 0; transparent: true"
      class="clickable"
      data-track="1"
      onclick="handleMarkerTap(1)">
    </a-plane>
    <a-text value="▶ タップして再生" align="center" position="0 -0.6 0" scale="0.4 0.4 0.4" color="#fff"></a-text>
  </a-entity>

  <!-- マーカー2: トラック3 -->
  <a-entity mindar-image-target="targetIndex: 2">
    <a-plane
      position="0 0 0"
      width="1" height="1"
      material="opacity: 0; transparent: true"
      class="clickable"
      data-track="2"
      onclick="handleMarkerTap(2)">
    </a-plane>
    <a-text value="▶ タップして再生" align="center" position="0 -0.6 0" scale="0.4 0.4 0.4" color="#fff"></a-text>
  </a-entity>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
</a-scene>

<!-- ── オーバーレイUI ── -->
<div id="overlay">
  <div id="status-bar">
    <div id="status-dot"></div>
    <div id="status-text">接続中...</div>
  </div>

  <div id="now-playing">
    <div id="now-playing-title">♪ 再生中</div>
    <div id="now-playing-sub" id="now-playing-track"></div>
  </div>

  <button id="stop-btn" onclick="sendStop()">⏹ 停止</button>

  <div id="hint">マーカーにカメラを向けてタップ</div>
</div>

<script>
// ═══════════════════════════════════════════
//  設定
// ═══════════════════════════════════════════
// WebSocketのURLは現在のホストから自動生成
const WS_PROTOCOL = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL      = `${WS_PROTOCOL}//${location.host}`;

// ═══════════════════════════════════════════
//  変数
// ═══════════════════════════════════════════
let ws           = null;
let token        = '';
let trackNames   = [];
let isPlaying    = false;
let reconnectTimer = null;
let arStarted    = false;

// ═══════════════════════════════════════════
//  起動時: localStorageからトークン読み込み
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ar_music_token');
  if (saved) {
    token = saved;
    document.getElementById('auth-screen').style.display = 'none';
    connectWS();
  }
});

// ═══════════════════════════════════════════
//  認証
// ═══════════════════════════════════════════
function doAuth() {
  const input = document.getElementById('token-input').value.trim();
  if (!input) return;
  token = input;
  document.getElementById('auth-error').style.display = 'none';
  connectWS();
}

document.getElementById('token-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doAuth();
});

// ═══════════════════════════════════════════
//  WebSocket 接続
// ═══════════════════════════════════════════
function connectWS() {
  setStatus('接続中...', '');

  if (ws) {
    ws.onclose = null;
    ws.close();
  }

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    // 認証トークン送信
    ws.send(JSON.stringify({ token }));
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.event === 'authenticated') {
      // 認証成功
      localStorage.setItem('ar_music_token', token);
      document.getElementById('auth-screen').style.display = 'none';
      trackNames = msg.tracks || [];
      setStatus('接続完了 ✓', 'connected');
      showToast('サーバーに接続しました');
      startAR();

    } else if (msg.error === 'unauthorized') {
      // 認証失敗
      localStorage.removeItem('ar_music_token');
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('auth-error').style.display = 'block';
      setStatus('認証エラー', 'error');

    } else if (msg.event === 'play') {
      onPlayConfirmed(msg.track);

    } else if (msg.event === 'stop') {
      onStopConfirmed();
    }
  };

  ws.onerror = () => {
    setStatus('接続エラー', 'error');
  };

  ws.onclose = () => {
    setStatus('切断 – 再接続中...', 'error');
    isPlaying = false;
    updatePlayingUI(false);
    // 3秒後に再接続
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connectWS, 3000);
  };
}

// ═══════════════════════════════════════════
//  AR 起動
// ═══════════════════════════════════════════
function startAR() {
  if (arStarted) return;
  arStarted = true;
  const scene = document.querySelector('a-scene');
  scene.addEventListener('loaded', () => {
    const sys = scene.systems['mindar-image-system'];
    if (sys) sys.start();
  });
  if (scene.hasLoaded) {
    const sys = scene.systems['mindar-image-system'];
    if (sys) sys.start();
  }
}

// ═══════════════════════════════════════════
//  マーカータップ
// ═══════════════════════════════════════════
function handleMarkerTap(trackIndex) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    showToast('サーバーに接続されていません');
    return;
  }
  ws.send(JSON.stringify({ type: 'play', track: trackIndex, token }));
  showToast(`♪ 再生リクエスト送信 (トラック${trackIndex + 1})`);
}

// ═══════════════════════════════════════════
//  停止
// ═══════════════════════════════════════════
function sendStop() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'stop', token }));
}

// ═══════════════════════════════════════════
//  UI更新
// ═══════════════════════════════════════════
function onPlayConfirmed(trackIndex) {
  isPlaying = true;
  const name = trackNames[trackIndex] || `トラック ${trackIndex + 1}`;
  document.getElementById('now-playing-title').textContent = '♪ 再生中';
  document.getElementById('now-playing-sub').textContent   = name;
  updatePlayingUI(true);
  setStatus(`再生中: ${name}`, 'playing');
}

function onStopConfirmed() {
  isPlaying = false;
  updatePlayingUI(false);
  setStatus('接続完了 ✓', 'connected');
}

function updatePlayingUI(playing) {
  const banner = document.getElementById('now-playing');
  const stopBtn = document.getElementById('stop-btn');
  const hint    = document.getElementById('hint');
  if (playing) {
    banner.classList.add('visible');
    stopBtn.classList.add('visible');
    hint.style.display = 'none';
  } else {
    banner.classList.remove('visible');
    stopBtn.classList.remove('visible');
    hint.style.display = 'block';
  }
}

function setStatus(text, type) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = '';
  if (type) dot.classList.add(type);
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
